<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enclave — Sign in</title>
  <meta name="description" content="Invite-only private chat. Sign in with the credentials your administrator gave you." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Space Grotesk", "system-ui", "sans-serif"],
            sans: ["Inter", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Inter", system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#14161B] text-slate-100 antialiased">
  <div class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">
    <div class="pointer-events-none absolute left-1/2 top-1/2 h-[32rem] w-[32rem] -translate-x-1/2 -translate-y-1/2 rounded-full bg-amber-500/10 blur-3xl"></div>

    <div id="config-warning" class="relative hidden w-full max-w-sm rounded-2xl border border-amber-500/30 bg-amber-500/10 p-6 text-sm text-amber-200">
      <p class="font-display font-semibold text-amber-300">Firebase isn't configured yet</p>
      <p class="mt-2 leading-relaxed">
        Open <code class="rounded bg-black/30 px-1 py-0.5 text-xs">js/firebase-config.js</code> and paste in your
        Firebase project's config values. The full walkthrough is in <code class="rounded bg-black/30 px-1 py-0.5 text-xs">README.md</code>.
      </p>
    </div>

    <div id="form-wrapper" class="relative w-full max-w-sm">
      <div class="mb-8 text-center">
        <div class="mb-3 inline-flex h-12 w-12 items-center justify-center rounded-2xl border border-amber-500/30 bg-amber-500/10">
          <svg class="h-6 w-6 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="11" width="16" height="10" rx="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
          </svg>
        </div>
        <h1 class="font-display text-2xl font-semibold tracking-tight text-slate-50">Enclave</h1>
        <p class="mt-1 text-sm text-slate-400">Invite-only. Sign in with the credentials your admin gave you.</p>
      </div>

      <div class="rounded-2xl border border-white/10 bg-[#1C1F26] p-6 shadow-2xl shadow-black/40">
        <form id="login-form" class="space-y-4">
          <div>
            <label for="username" class="mb-1.5 block text-xs font-medium text-slate-400">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              autofocus
              required
              placeholder="yourname"
              class="w-full rounded-lg border border-white/10 bg-[#14161B] px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 outline-none transition focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20"
            />
          </div>
          <div>
            <label for="password" class="mb-1.5 block text-xs font-medium text-slate-400">Password</label>
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="••••••••"
                class="w-full rounded-lg border border-white/10 bg-[#14161B] px-3.5 py-2.5 pr-14 text-sm text-slate-100 placeholder-slate-600 outline-none transition focus:border-amber-500/50 focus:ring-2 focus:ring-amber-500/20"
              />
              <button
                type="button"
                id="toggle-password"
                aria-label="Show password"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-slate-500 hover:text-slate-300"
              >Show</button>
            </div>
          </div>

          <div id="error-box" class="hidden rounded-lg border border-rose-500/20 bg-rose-500/10 px-3.5 py-2.5 text-sm text-rose-400"></div>

          <button
            id="submit-button"
            type="submit"
            class="w-full rounded-lg bg-amber-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-amber-400 disabled:cursor-not-allowed disabled:opacity-60"
          >Sign in</button>
        </form>
      </div>

      <p class="mt-6 text-center text-xs text-slate-600">No sign-up here — accounts are created by an administrator.</p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
